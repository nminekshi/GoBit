name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/ci
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Verify MongoDB readiness
      run: |
        for i in {1..15}; do
          container_id=$(docker ps -q --filter "ancestor=mongo:7")
          if [ -n "$container_id" ] && docker exec "$container_id" mongosh --quiet --eval "db.adminCommand({ ping: 1 })"; then
            exit 0
          fi
          sleep 2
        done
        echo "MongoDB did not become ready in time" >&2
        docker ps -a
        exit 1

    - name: Run Tests
      run: npm test

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Lint
      # Removing lint for now if it's too strict, but keeping it as requested
      run: npm run lint

    - name: Test
      run: npm test

    - name: Build
      run: npm run build
